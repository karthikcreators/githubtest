<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
    }

    .open-btn {
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .open-btn:hover {
      background: #4338ca;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .overlay.active {
      display: flex;
    }

    .popup {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .popup h2 {
      font-size: 20px;
      color: #1f2937;
      margin-bottom: 12px;
    }

    .popup p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .popup-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn-cancel {
      padding: 10px 20px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      color: #374151;
    }

    .btn-cancel:hover {
      background: #f9fafb;
    }

    .btn-confirm {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      background: #4f46e5;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-confirm:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <button class="open-btn" id="openPopup">Open Popup</button>

  <div class="overlay" id="overlay">
    <div class="popup">
      <h2>Hello there!</h2>
      <p>This is a simple popup modal. You can close it by clicking the buttons below or clicking outside the popup.</p>
      <div class="popup-actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-confirm" id="confirmBtn">Got it</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const openBtn = document.getElementById('openPopup');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    function openPopup() {
      overlay.classList.add('active');
    }

    function closePopup() {
      overlay.classList.remove('active');
    }

    openBtn.addEventListener('click', openPopup);
    cancelBtn.addEventListener('click', closePopup);
    confirmBtn.addEventListener('click', closePopup);

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) {
        closePopup();
      }
    });
  </script>
</body>
</html>
